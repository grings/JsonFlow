name: Deploy Docs

# Builds the Docusaurus site and publishes it to GitHub Pages via the
# Actions-native artifact flow — the built site is NOT committed to the repo.

on:
  push:
    branches: [main]
    paths:
      - 'docs-src/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: docs-src/package-lock.json

      - name: Install dependencies
        run: cd docs-src && npm ci

      - name: Build Docusaurus
        run: cd docs-src && npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
